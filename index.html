<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golazo · World Cup 2026 Lineups</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚽</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:ital,wght@0,500;0,600;0,700;0,800;1,800&display=swap" rel="stylesheet">
<style>
:root{--font-display:'Barlow Semi Condensed',system-ui,sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,-apple-system,sans-serif;background:#0f172a;color:#f1f5f9;min-height:100vh;overflow:hidden;}

header{
  background:#1e293b;padding:12px 20px;display:flex;align-items:center;gap:12px;
  border-bottom:1px solid #334155;height:52px;flex-shrink:0;
}
header h1{font-family:var(--font-display);font-size:1.5rem;font-weight:800;font-style:italic;text-transform:uppercase;letter-spacing:.005em;line-height:1;}
header h1 .g{color:#7bd957;}
header .sub{color:#64748b;font-size:0.8rem;margin-top:1px;}

.app{display:flex;height:calc(100vh - 52px);}

/* ── Left: match list ── */
.match-panel{width:270px;background:#1e293b;border-right:1px solid #334155;display:flex;flex-direction:column;flex-shrink:0;}
.match-panel-head{padding:10px 14px;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#475569;border-bottom:1px solid #334155;flex-shrink:0;}
#match-list{overflow-y:auto;flex:1;}

.match-card{padding:12px 14px;border-bottom:1px solid #1e293b;cursor:pointer;transition:background .12s;border-left:3px solid transparent;}
.match-card:hover{background:#263348;}
.match-card.active{background:#172554;border-left-color:#3b82f6;}
.mc-teams{font-size:0.85rem;font-weight:600;margin-bottom:3px;line-height:1.3;display:flex;align-items:center;gap:6px;}
.mc-teams img{width:16px;height:16px;object-fit:contain;flex-shrink:0;}
.mc-score{color:#94a3b8;font-weight:700;}
.mc-meta{font-size:0.72rem;color:#64748b;}
.mc-live{color:#22c55e;} .mc-ft{color:#475569;} .mc-pre{color:#f59e0b;}

/* ── Center: pitch ── */
.main-panel{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}

.team-bar{display:flex;background:#1e293b;border-bottom:1px solid #334155;align-items:center;padding:0 14px;gap:2px;flex-shrink:0;height:44px;}
.team-tab{padding:0 16px;height:100%;cursor:pointer;font-size:0.83rem;font-weight:600;color:#475569;border-bottom:2px solid transparent;display:flex;align-items:center;transition:all .12s;}
.team-tab.active{color:#f1f5f9;border-bottom-color:#3b82f6;}
.team-tab.dim{opacity:.45;}
.bar-right{margin-left:auto;display:flex;align-items:center;gap:10px;font-size:0.78rem;color:#64748b;}
.bar-right select{background:#0f172a;color:#f1f5f9;border:1px solid #334155;border-radius:6px;padding:4px 8px;font-size:0.78rem;cursor:pointer;}
.bar-right select:focus{outline:none;border-color:#3b82f6;}
.both-btn{background:#0f172a;border:1px solid #334155;color:#94a3b8;border-radius:6px;padding:5px 11px;font-size:0.75rem;font-weight:600;cursor:pointer;transition:all .12s;}
.both-btn:hover{color:#f1f5f9;}
.both-btn.on{background:#2563eb;color:#fff;border-color:#2563eb;}

/* ── Scorebar ── */
.scorebar{display:flex;align-items:center;justify-content:center;gap:14px;background:#0f172a;border-bottom:1px solid #1e293b;padding:7px 14px;flex-shrink:0;}
.sb-team{display:flex;align-items:center;gap:7px;font-family:var(--font-display);font-weight:700;font-size:1.05rem;text-transform:uppercase;letter-spacing:.04em;}
.sb-team img{width:22px;height:22px;object-fit:contain;}
.sb-score{font-size:1.2rem;font-weight:800;letter-spacing:1px;min-width:54px;text-align:center;}
.sb-status{font-size:0.74rem;font-weight:700;color:#22c55e;padding:2px 8px;border-radius:20px;background:rgba(34,197,94,.12);}
.sb-status.pre{color:#f59e0b;background:rgba(245,158,11,.12);}
.sb-status.post{color:#94a3b8;background:rgba(148,163,184,.12);}
.sb-updated{color:#475569;font-size:0.68rem;}

.pitch-area{flex:1;display:flex;align-items:center;justify-content:center;padding:16px;position:relative;overflow:hidden;}

.action-bar{padding:8px 14px;background:#0f172a;border-top:1px solid #1e293b;display:flex;gap:8px;justify-content:flex-end;align-items:center;flex-shrink:0;}
.action-bar .hint{margin-right:auto;font-size:0.7rem;color:#475569;}
.action-bar button{padding:6px 14px;border:none;border-radius:6px;cursor:pointer;font-size:0.78rem;font-weight:600;transition:background .12s;}
.btn-reset{background:#1e293b;color:#94a3b8;border:1px solid #334155;}
.btn-reset:hover{color:#f1f5f9;border-color:#475569;}
.btn-export{background:#334155;color:#f1f5f9;}
.btn-export:hover{background:#475569;}
.btn-png{background:#16a34a;color:#fff;}
.btn-png:hover{background:#15803d;}

/* ── Right: bench + editor ── */
.right-panel{width:240px;background:#1e293b;border-left:1px solid #334155;display:flex;flex-direction:column;flex-shrink:0;}
.bench-section{flex:1;overflow-y:auto;padding:10px 12px;}
.bench-head{font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#475569;margin-bottom:8px;}
.bench-player{display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:7px;cursor:pointer;transition:background .12s;margin-bottom:3px;}
.bench-player:hover{background:#263348;}
.bench-player.sel-bench{background:#1e3a5f;outline:1px solid #3b82f6;}
.bp-jersey{width:26px;height:26px;border-radius:50%;background:#334155;display:flex;align-items:center;justify-content:center;font-size:0.72rem;font-weight:700;flex-shrink:0;}
.bp-name{font-size:0.8rem;line-height:1.2;}
.bp-pos{font-size:0.68rem;color:#64748b;}

.edit-section{border-top:1px solid #334155;padding:14px 12px;max-height:62%;overflow-y:auto;}
.edit-head{font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#475569;margin-bottom:10px;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px 12px;margin:0 0 12px;}
.stat-grid div{display:flex;justify-content:space-between;font-size:0.72rem;color:#94a3b8;border-bottom:1px solid #1e293b;padding:3px 0;}
.stat-grid b{color:#f1f5f9;}
.edit-field{margin-bottom:9px;}
.edit-field label{display:block;font-size:0.72rem;color:#94a3b8;margin-bottom:3px;}
.edit-field input,.edit-field select{
  width:100%;background:#0f172a;color:#f1f5f9;border:1px solid #334155;
  border-radius:6px;padding:6px 9px;font-size:0.8rem;
}
.edit-field input:focus,.edit-field select:focus{outline:none;border-color:#3b82f6;}
.btn-block{width:100%;padding:7px;border:none;border-radius:6px;cursor:pointer;font-size:0.78rem;font-weight:600;margin-top:5px;transition:background .12s;}
.btn-apply{background:#2563eb;color:#fff;} .btn-apply:hover{background:#1d4ed8;}
.btn-sub{background:#16a34a;color:#fff;} .btn-sub:hover{background:#15803d;}
.btn-clear{background:#1e293b;color:#64748b;border:1px solid #334155;margin-top:3px;} .btn-clear:hover{color:#f1f5f9;}

/* ── Loading / empty ── */
.loading,.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;height:100%;color:#475569;text-align:center;padding:24px;}
.spinner{width:28px;height:28px;border:3px solid #334155;border-top-color:#3b82f6;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty-icon{font-size:2.5rem;}
.empty-title{font-size:0.95rem;font-weight:600;color:#64748b;}
.empty-sub{font-size:0.8rem;max-width:340px;}
.btn-manual{margin-top:12px;padding:9px 20px;background:#2563eb;color:#fff;border:none;border-radius:7px;cursor:pointer;font-size:0.82rem;font-weight:600;}
.btn-manual:hover{background:#1d4ed8;}

/* ── Player nodes on pitch ── */
.player-node{
  position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;
  align-items:center;cursor:grab;z-index:10;user-select:none;touch-action:none;
}
.player-node.static{cursor:default;}
.player-node.dragging{z-index:50;cursor:grabbing;}
.pc{
  width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:0.78rem;font-weight:700;color:#fff;border:2px solid rgba(255,255,255,.45);
  box-shadow:0 2px 8px rgba(0,0,0,.5);transition:transform .12s,box-shadow .12s;position:relative;
}
.pc-shirt{width:46px;height:46px;position:relative;display:flex;align-items:center;justify-content:center;
  transition:transform .12s;filter:drop-shadow(0 2px 5px rgba(0,0,0,.55));}
.pc-shirt img{width:100%;height:100%;object-fit:contain;pointer-events:none;}
.player-node:not(.static):hover .pc,.player-node:not(.static):hover .pc-shirt{transform:scale(1.13);}
.player-node.sel .pc{box-shadow:0 0 0 3px #fbbf24,0 4px 14px rgba(0,0,0,.5);background:#d97706 !important;}
.player-node.sel .pc-shirt{filter:drop-shadow(0 0 0 #fbbf24) drop-shadow(0 0 4px #fbbf24);}
.pn-label{
  font-family:var(--font-display);background:rgba(7,12,24,.82);color:#fff;
  font-size:0.74rem;font-weight:700;text-transform:uppercase;letter-spacing:.045em;line-height:1.12;
  padding:2px 7px;border-radius:4px;margin-top:3px;white-space:nowrap;
  max-width:98px;overflow:hidden;text-overflow:ellipsis;pointer-events:none;
  box-shadow:0 1px 5px rgba(0,0,0,.45);
}
.pn-role{font-family:var(--font-display);font-size:0.62rem;font-weight:600;
  text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.6);
  background:rgba(0,0,0,.45);padding:1px 5px;border-radius:3px;margin-top:2px;pointer-events:none;}
.pn-badges{position:absolute;top:-7px;right:-9px;display:flex;gap:1px;pointer-events:none;}
.pn-badges span{font-size:0.6rem;line-height:1.25;background:rgba(0,0,0,.65);border-radius:4px;padding:0 2px;}

/* ── Flanking team panels (both-teams view): Lineup / Subs / Manager ── */
.pitch-area.both{gap:12px;}
.lineup-panel{width:205px;flex-shrink:0;height:100%;background:#1e293b;border:1px solid #334155;border-radius:10px;display:flex;flex-direction:column;overflow:hidden;}
.lp-head{display:flex;align-items:center;gap:7px;padding:10px 11px;color:#fff;font-family:var(--font-display);font-weight:700;font-size:0.98rem;text-transform:uppercase;letter-spacing:.03em;}
.lp-head img{width:18px;height:18px;object-fit:contain;flex-shrink:0;}
.lp-head .lp-team{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lp-color{width:22px;height:22px;border:1px solid rgba(255,255,255,.5);background:none;padding:0;cursor:pointer;border-radius:5px;flex-shrink:0;}
.lineup-panel.right .lp-head{flex-direction:row-reverse;}
.lineup-panel.right .lp-head .lp-team{text-align:right;}
.lp-body{flex:1;overflow-y:auto;padding:4px 11px 12px;}
.lp-section{font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.13em;color:#64748b;margin:12px 0 5px;}
.lineup-panel.right .lp-section{text-align:right;}
.lp-row{display:flex;align-items:center;gap:9px;padding:2px 0;}
.lineup-panel.right .lp-row{flex-direction:row-reverse;}
.lp-num{min-width:20px;text-align:center;color:#94a3b8;font-weight:700;font-size:0.72rem;flex-shrink:0;}
.lp-name{flex:1;min-width:0;font-family:var(--font-display);font-weight:600;font-size:0.82rem;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lineup-panel.right .lp-name{text-align:right;}

@media(max-width:880px){
  .match-panel{width:210px;} .right-panel{width:210px;}
  .lineup-panel{width:170px;}
}
@media(max-width:760px){
  .pitch-area.both{flex-direction:column;align-items:stretch;}
  .lineup-panel{width:100%;height:auto;}
  .lp-body{max-height:300px;}
}
@media(max-width:640px){
  html,body{overflow:auto;-webkit-text-size-adjust:100%;}
  header{padding:10px 14px;}
  header h1{font-size:1.05rem;}
  .app{flex-direction:column;height:auto;}

  /* Matches become a compact horizontal strip at the top */
  .match-panel{width:100%;border:none;border-bottom:1px solid #334155;}
  #match-list{display:flex;flex-direction:row;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;flex:none;}
  .match-card{flex:0 0 auto;min-width:170px;border-bottom:none;border-right:1px solid #1e293b;border-left:none;border-top:3px solid transparent;}
  .match-card.active{border-left-color:transparent;border-top-color:#3b82f6;}

  /* Pitch fills the screen width; aspect-ratio drives its height */
  .main-panel{order:2;overflow:visible;}
  .pitch-area{padding:8px;min-height:0;overflow:visible;}
  .pitch-field{height:auto !important;width:100% !important;}

  /* Toolbars wrap instead of overflowing */
  .team-bar{height:auto;flex-wrap:wrap;padding:6px 10px;gap:6px;}
  .bar-right{margin-left:0;flex-wrap:wrap;width:100%;}
  .action-bar{flex-wrap:wrap;justify-content:center;}
  .action-bar .hint{flex-basis:100%;text-align:center;}
  .scorebar{flex-wrap:wrap;}

  /* Bench / editor below the pitch */
  .right-panel{order:3;width:100%;border:none;border-top:1px solid #334155;}

  /* Smaller pitch nodes so 5-across formations don't crowd on a phone */
  .pc{width:30px;height:30px;font-size:0.68rem;}
  .pc-shirt{width:38px;height:38px;}
  .pn-label{font-size:0.64rem;max-width:72px;padding:1px 5px;}
  .pn-role{font-size:0.54rem;}
}
</style>
</head>
<body>

<header>
  <span style="font-size:1.4rem">⚽</span>
  <div>
    <h1><span class="g">Golazo</span> · World Cup 2026</h1>
    <div class="sub">Live lineups via ESPN · drag players, edit, export</div>
  </div>
</header>

<div class="app">

  <!-- Match list -->
  <div class="match-panel">
    <div class="match-panel-head">Matches</div>
    <div id="match-list">
      <div class="loading"><div class="spinner"></div><span>Loading matches…</span></div>
    </div>
  </div>

  <!-- Pitch -->
  <div class="main-panel">
    <div class="team-bar" id="team-bar" style="display:none">
      <div class="team-tab active" data-team="0" id="tab-0">Home</div>
      <div class="team-tab" data-team="1" id="tab-1">Away</div>
      <div class="bar-right">
        <button class="both-btn" id="both-toggle" onclick="toggleBoth()">Both teams</button>
        <span>Formation:</span>
        <select id="fmn-select">
          <option value="4-3-3">4-3-3</option>
          <option value="4-4-2">4-4-2</option>
          <option value="4-2-3-1">4-2-3-1</option>
          <option value="3-5-2">3-5-2</option>
          <option value="3-4-3">3-4-3</option>
          <option value="5-3-2">5-3-2</option>
          <option value="4-5-1">4-5-1</option>
          <option value="4-1-4-1">4-1-4-1</option>
        </select>
      </div>
    </div>

    <div class="scorebar" id="scorebar" style="display:none"></div>

    <div class="pitch-area" id="pitch-area">
      <div class="empty-state">
        <div class="empty-icon">🏟️</div>
        <div class="empty-title">Select a match</div>
        <div class="empty-sub">Choose a match on the left to load its lineup</div>
      </div>
    </div>

    <div class="action-bar" id="action-bar" style="display:none">
      <span class="hint" id="action-hint"></span>
      <button class="btn-reset" onclick="resetLineup()">↩ Reset</button>
      <button class="btn-png" onclick="exportPNG()">🖼 Export PNG</button>
      <button class="btn-export" onclick="exportLineup()">⬇ .txt</button>
    </div>
  </div>

  <!-- Bench + editor -->
  <div class="right-panel">
    <div class="bench-section">
      <div class="bench-head">Bench / Subs</div>
      <div id="bench-list"><div style="color:#334155;font-size:0.8rem;padding:8px">No match loaded</div></div>
    </div>
    <div class="edit-section" id="edit-section" style="display:none">
      <div class="edit-head" id="edit-head">Edit Player</div>
      <div id="player-stats"></div>
      <div class="edit-field"><label>Name</label><input id="e-name" type="text" placeholder="Player name"></div>
      <div class="edit-field"><label>Jersey #</label><input id="e-num" type="number" min="1" max="99" placeholder="##"></div>
      <div class="edit-field">
        <label>Position</label>
        <select id="e-pos">
          <option value="GK">GK - Goalkeeper</option>
          <option value="RB">RB - Right Back</option>
          <option value="CB">CB - Centre Back</option>
          <option value="LB">LB - Left Back</option>
          <option value="RWB">RWB - Right Wing Back</option>
          <option value="LWB">LWB - Left Wing Back</option>
          <option value="CDM">CDM - Defensive Mid</option>
          <option value="CM">CM - Central Mid</option>
          <option value="CAM">CAM - Attacking Mid</option>
          <option value="RM">RM - Right Mid</option>
          <option value="LM">LM - Left Mid</option>
          <option value="RW">RW - Right Wing</option>
          <option value="LW">LW - Left Wing</option>
          <option value="CF">CF - Centre Forward</option>
          <option value="ST">ST - Striker</option>
        </select>
      </div>
      <button class="btn-block btn-apply" onclick="applyEdits()">✓ Apply Changes</button>
      <button class="btn-block btn-sub" id="btn-sub" onclick="makeSubstitution()" style="display:none">↕ Sub with selected bench player</button>
      <button class="btn-block btn-clear" onclick="clearSel()">✕ Deselect</button>
    </div>
  </div>

</div>

<script>
const LOGO_SRC = 'golazo-logo.png';
const POLL_MS  = 30000;

// ── STATE ─────────────────────────────────────────────────────────────────
const S = {
  matches:[], matchId:null,
  homeTeam:'Home', awayTeam:'Away',
  teamAbbr:['HOME','AWAY'], teamLogo:['',''], teamColor:['#1d4ed8','#be123c'],
  score:['',''], statusText:'', statusState:'pre', lastUpdate:null,
  starters:[[],[]], bench:[[],[]], orig:[[],[]],
  activeTeam:0,
  teamFormation:['4-3-3','4-3-3'], formation:'4-3-3',
  teamColorOverride:[null,null],
  selPlayer:null, selBench:null,
  dirty:[false,false],
  bothView:false,
  pollTimer:null,
};
const BASE = 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world';
const clone = o => JSON.parse(JSON.stringify(o));
const esc = s => String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const KEY = id => 'golazo:lineup:'+id;

// ── ESPN API ──────────────────────────────────────────────────────────────
async function fetchMatches({silent=false}={}){
  try{
    const dateStr = new Date().toISOString().slice(0,10).replace(/-/g,'');
    let events=[];
    for(const url of [`${BASE}/scoreboard`,`${BASE}/scoreboard?dates=${dateStr}`,`${BASE}/scoreboard?limit=50`]){
      if(events.length) break;
      const r=await fetch(url);
      if(r.ok){ events=(await r.json()).events||[]; }
    }
    if(events.length){ S.matches=events; renderMatchList(events); }
    else if(!silent){ showMatchError('No matches found yet. The tournament may not have started, or ESPN may be using a different endpoint for this edition.'); }
  }catch(e){
    console.error(e);
    if(!silent) showMatchError('Could not reach ESPN API. Check your internet connection.');
  }
}

async function fetchLineup(id,{silent=false}={}){
  const pa=document.getElementById('pitch-area');
  if(!silent) pa.innerHTML='<div class="loading"><div class="spinner"></div><span>Loading lineup…</span></div>';
  try{
    const r=await fetch(`${BASE}/summary?event=${id}`);
    if(!r.ok) throw new Error('HTTP '+r.status);
    const data=await r.json();
    if(S.matchId!==id) return;          // user switched away mid-request
    processData(data,{silent});
  }catch(e){
    console.error(e);
    if(!silent) pa.innerHTML=`<div class="empty-state">
      <div class="empty-icon">⚠️</div><div class="empty-title">Couldn't load lineup</div>
      <div class="empty-sub">Auto-refresh will keep retrying every ${POLL_MS/1000}s.</div>
      <button class="btn-manual" onclick="loadManual()">✏️ Enter lineup manually</button></div>`;
  }
}

function startPolling(){
  stopPolling();
  S.pollTimer=setInterval(()=>{
    if(S.matchId) fetchLineup(S.matchId,{silent:true});
    fetchMatches({silent:true});
  }, POLL_MS);
}
function stopPolling(){ if(S.pollTimer){clearInterval(S.pollTimer);S.pollTimer=null;} }

// ── DATA PROCESSING ─────────────────────────────────────────────────────────
function logoOf(c){ return c.team?.logos?.[0]?.href || c.team?.logo || ''; }
function jerseyOf(a){ const j=a.jerseyImages||[]; return (j.find(x=>(x.rel||[]).includes('dark'))||j[0]||{}).href || ''; }
function parseStats(arr){ const o={}; (arr||[]).forEach(s=>{ if(s.abbreviation!=null) o[s.abbreviation]=s.displayValue; }); return o; }
function teamColor(c,def){
  let col=c.team?.color; if(!col) return def; col=col.replace('#','');
  if(col.length!==6) return def;
  const r=parseInt(col.slice(0,2),16),g=parseInt(col.slice(2,4),16),b=parseInt(col.slice(4,6),16);
  const lum=0.299*r+0.587*g+0.114*b;
  return (lum>210||lum<25)?def:'#'+col;   // avoid near-white / near-black
}
// Single source of truth for a team's colour: manual override beats ESPN's beats default
function teamCol(t){ return S.teamColorOverride[t] || S.teamColor[t] || (t===0?'#1d4ed8':'#be123c'); }
// Hue (0–360) of a #rrggbb colour
function hueOf(hex){
  hex=(hex||'').replace('#',''); if(hex.length!==6) return 0;
  const r=parseInt(hex.slice(0,2),16)/255,g=parseInt(hex.slice(2,4),16)/255,b=parseInt(hex.slice(4,6),16)/255;
  const mx=Math.max(r,g,b),mn=Math.min(r,g,b),d=mx-mn;
  if(!d) return 0;
  let h = mx===r ? ((g-b)/d)%6 : mx===g ? (b-r)/d+2 : (r-g)/d+4;
  h*=60; return h<0?h+360:h;
}
// When a team's colour is overridden, recolour its real jersey photos toward that colour
// by hue-rotating away from ESPN's (kit-matching) base colour. Empty string = leave as-is.
function kitFilter(t){
  const ov=S.teamColorOverride[t]; if(!ov) return '';
  let d=Math.round(hueOf(ov)-hueOf(S.teamColor[t]||ov));
  d=((d%360)+540)%360-180;                 // shortest rotation, -180..180
  return Math.abs(d)<8 ? '' : `hue-rotate(${d}deg) saturate(1.15)`;
}
// Distinct away-kit options, used when two teams' colours clash
const KIT_PALETTE=['#1d4ed8','#15803d','#a21caf','#ea580c','#0891b2','#ca8a04','#e11d48'];
function hueGap(a,b){ const d=Math.abs(hueOf(a)-hueOf(b)); return Math.min(d,360-d); }
// If the two teams' kit colours are too similar, auto-recolour the away side to a contrasting kit.
// Never overrides a colour the user (or a saved edit) has already set.
function autoFixClash(){
  if(S.teamColorOverride[0]||S.teamColorOverride[1]) return;     // respect manual / restored choices
  const home=S.teamColor[0], away=S.teamColor[1];
  if(!home||!away) return;
  if(hueGap(home,away)>=35) return;                              // already distinguishable
  let best=KIT_PALETTE[0], bestGap=-1;                           // pick the palette colour furthest from home
  for(const c of KIT_PALETTE){ const g=hueGap(c,home); if(g>bestGap){ bestGap=g; best=c; } }
  S.teamColorOverride[1]=best;
}

function processData(data,{silent=false}={}){
  // Header: teams, score, status, logos, colors
  const comp=data.header?.competitions?.[0]||{};
  const cs=comp.competitors||[];
  const home=cs.find(c=>c.homeAway==='home')||cs[0]||{};
  const away=cs.find(c=>c.homeAway==='away')||cs[1]||{};
  S.homeTeam=home.team?.displayName||'Home';
  S.awayTeam=away.team?.displayName||'Away';
  S.teamAbbr=[home.team?.abbreviation||S.homeTeam, away.team?.abbreviation||S.awayTeam];
  S.teamLogo=[logoOf(home),logoOf(away)];
  S.teamColor=[teamColor(home,'#1d4ed8'),teamColor(away,'#be123c')];
  S.score=[home.score??'', away.score??''];
  const stt=comp.status||{};
  S.statusState=stt.type?.state||'pre';
  if(S.statusState==='pre') S.statusText=comp.date?new Date(comp.date).toLocaleString('en-GB',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):'Scheduled';
  else if(S.statusState==='post') S.statusText='FT';
  else S.statusText='● '+(stt.displayClock||stt.type?.detail||'LIVE');
  S.lastUpdate=new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('tab-0').textContent=S.homeTeam;
  document.getElementById('tab-1').textContent=S.awayTeam;
  updateScorebar();

  const rosters=data.rosters||[];
  if(!rosters.length){
    if(!silent){
      document.getElementById('pitch-area').innerHTML=`<div class="empty-state">
        <div class="empty-icon">📋</div><div class="empty-title">Lineup not posted yet</div>
        <div class="empty-sub">Auto-refreshing every ${POLL_MS/1000}s — the XI will appear here the moment ESPN releases it (usually ~1h before kickoff).</div>
        <button class="btn-manual" onclick="loadManual()">✏️ Enter lineup manually</button></div>`;
      document.getElementById('team-bar').style.display='flex';
      document.getElementById('action-bar').style.display='flex';
    }
    return;
  }

  // Build fresh squads — but never clobber a team the user has edited
  for(let t=0;t<2;t++){
    if(S.dirty[t]) continue;
    const roster=rosters[t]; if(!roster) continue;
    const starters=[],bench=[];
    (roster.roster||[]).forEach(e=>{
      const a=e.athlete||{};
      const rawPos=e.position?.abbreviation||a.position?.abbreviation||'';
      const stats=parseStats(e.stats);
      const p={
        id:a.id, name:a.displayName||a.shortName||'Unknown', short:shortName(a.displayName||''),
        jersey:e.jersey||a.jersey||'?', pos:normPos(rawPos), rawPos,
        formationPlace:+(e.formationPlace)||0, starter:e.starter===true,
        subbedIn:!!e.subbedIn, subbedOut:!!e.subbedOut,
        img:jerseyOf(a), stats,
        goals:+stats.G||0, assists:+stats.A||0, yellow:+stats.YC||0, red:+stats.RC||0,
        cx:null, cy:null,
      };
      (p.starter?starters:bench).push(p);
    });
    starters.sort((a,b)=>(a.formationPlace||0)-(b.formationPlace||0));
    S.starters[t]=starters.slice(0,11);
    S.bench[t]=bench;
    S.orig[t]=clone(S.starters[t]);
    S.teamFormation[t]=roster.formation||detectFormation(S.starters[t])||'4-3-3';
  }

  // On a fresh (non-silent) load, restore any saved edits for this match
  if(!silent){
    const saved=loadEdits(S.matchId);
    if(saved){
      for(let t=0;t<2;t++){
        if(saved.dirty?.[t] && saved.starters?.[t]?.length){
          S.starters[t]=saved.starters[t];
          S.bench[t]=saved.bench?.[t]||S.bench[t];
          S.teamFormation[t]=saved.teamFormation?.[t]||S.teamFormation[t];
          S.dirty[t]=true;
        }
      }
      if(saved.colorOverride) S.teamColorOverride=saved.colorOverride;   // match-level extra
    }
    autoFixClash();   // recolour the away kit if it clashes with home (unless user/saved override)
    document.getElementById('team-bar').style.display='flex';
    document.getElementById('action-bar').style.display='flex';
  }

  S.formation=S.teamFormation[S.activeTeam];
  ensureFormationOption(S.formation);
  document.getElementById('fmn-select').value=S.formation;

  if(S.statusState==='post') stopPolling();   // finished matches don't change
  render();
}

// ── PERSISTENCE ─────────────────────────────────────────────────────────────
function markDirty(t){ S.dirty[t]=true; saveEdits(); updateHint(); }
function hasCustom(){ return S.dirty[0]||S.dirty[1]||S.teamColorOverride[0]||S.teamColorOverride[1]; }
function saveEdits(){
  try{
    if(S.matchId && hasCustom())
      localStorage.setItem(KEY(S.matchId), JSON.stringify({starters:S.starters,bench:S.bench,teamFormation:S.teamFormation,dirty:S.dirty,colorOverride:S.teamColorOverride}));
    else if(S.matchId) localStorage.removeItem(KEY(S.matchId));
  }catch(e){}
}
function loadEdits(id){ try{ const s=localStorage.getItem(KEY(id)); return s?JSON.parse(s):null; }catch(e){ return null; } }

// ── RENDER ────────────────────────────────────────────────────────────────
function render(){ renderPitch(); renderBench(); updateScorebar(); updateHint(); }

function updateHint(){
  const h=document.getElementById('action-hint'); if(!h)return;
  const edited=S.dirty[S.activeTeam];
  h.textContent = S.bothView ? 'Both-teams view · read-only'
    : edited ? '✎ edited (saved) · live refresh paused for this team'
    : 'drag players to reposition · click to edit';
}

function updateScorebar(){
  const sb=document.getElementById('scorebar'); if(!sb)return;
  if(!S.matchId){ sb.style.display='none'; return; }
  sb.style.display='flex';
  const cls=S.statusState==='in'?'':S.statusState==='post'?'post':'pre';
  sb.innerHTML=`
    <div class="sb-team">${S.teamLogo[0]?`<img src="${esc(S.teamLogo[0])}" alt="">`:''}<span>${esc(S.teamAbbr[0])}</span></div>
    <div class="sb-score">${esc(S.score[0])} <span style="color:#475569">-</span> ${esc(S.score[1])}</div>
    <div class="sb-team"><span>${esc(S.teamAbbr[1])}</span>${S.teamLogo[1]?`<img src="${esc(S.teamLogo[1])}" alt="">`:''}</div>
    <div class="sb-status ${cls}">${esc(S.statusText)}</div>
    ${S.lastUpdate?`<div class="sb-updated">updated ${esc(S.lastUpdate)}</div>`:''}`;
}

// Map a team's pitch coords into the combined "both teams" view
function placeCoord(t,x,y){
  if(!S.bothView) return {x,y};
  if(t===0) return { x,          y: 58 + (y-14)*(96-58)/(90-14) };   // home: bottom half (forwards kept off halfway line)
  return       { x: 100-x,     y: 42 - (y-14)*(42-4)/(90-14) };      // away: top half (mirrored)
}

function renderPitch(){
  const pa=document.getElementById('pitch-area');
  const have = S.starters[0]?.length || S.starters[1]?.length;
  if(!have){ pa.innerHTML='<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">No lineup data</div></div>'; return; }

  const field=document.createElement('div');
  field.className='pitch-field';
  field.style.cssText='position:relative;height:100%;aspect-ratio:2/3;max-width:100%;margin:0 auto;';
  field.appendChild(makePitchSVG());

  // Golazo watermark behind the players
  const wm=document.createElement('img');
  wm.src=LOGO_SRC; wm.alt='';
  wm.style.cssText='position:absolute;top:50%;left:50%;width:85%;transform:translate(-50%,-50%);opacity:.5;pointer-events:none;z-index:1;';
  field.appendChild(wm);

  const teams = S.bothView ? [0,1] : [S.activeTeam];
  teams.forEach(t=>renderTeamNodes(field,t,!S.bothView));

  pa.innerHTML='';
  pa.classList.toggle('both', S.bothView);
  if(S.bothView){
    pa.appendChild(buildTeamPanel(0));   // home on the left
    pa.appendChild(field);
    pa.appendChild(buildTeamPanel(1));   // away on the right
  } else {
    pa.appendChild(field);
  }
}

// A flanking squad card: coloured header (+ colour picker), Lineup, Substitutions, Manager
function buildTeamPanel(t){
  const wrap=document.createElement('div');
  wrap.className='lineup-panel'+(t===1?' right':'');

  const head=document.createElement('div');
  head.className='lp-head'; head.style.background=teamCol(t);
  if(S.teamLogo[t]){ const im=document.createElement('img'); im.src=S.teamLogo[t]; im.alt=''; head.appendChild(im); }
  const nm=document.createElement('span'); nm.className='lp-team'; nm.textContent=t===0?S.homeTeam:S.awayTeam; head.appendChild(nm);
  const pick=document.createElement('input');
  pick.type='color'; pick.className='lp-color'; pick.value=normHex(teamCol(t)); pick.title='Change team colour (fixes kit clashes)';
  pick.oninput=()=>{ S.teamColorOverride[t]=pick.value; saveEdits(); renderPitch(); };
  head.appendChild(pick);
  wrap.appendChild(head);

  const body=document.createElement('div'); body.className='lp-body';
  body.appendChild(panelSection('Lineup'));
  (S.starters[t]||[]).forEach(p=>body.appendChild(panelRow(t,p)));
  const bench=S.bench[t]||[];
  if(bench.length){ body.appendChild(panelSection('Substitutions')); bench.forEach(p=>body.appendChild(panelRow(t,p))); }
  wrap.appendChild(body);
  return wrap;
}
function panelSection(txt){ const d=document.createElement('div'); d.className='lp-section'; d.textContent=txt; return d; }
function panelRow(t,p){
  const row=document.createElement('div'); row.className='lp-row';
  const num=document.createElement('span'); num.className='lp-num'; num.textContent=p.jersey;
  const name=document.createElement('span'); name.className='lp-name'; name.textContent=p.short||p.name; name.title=p.name;
  row.appendChild(num); row.appendChild(name);   // CSS row-reverse mirrors the right panel
  return row;
}
// <input type=color> demands a 7-char #rrggbb; coerce anything else to a safe default
function normHex(c){ return /^#[0-9a-f]{6}$/i.test(c||'') ? c : '#1d4ed8'; }

function renderTeamNodes(field,t,interactive){
  const players=S.starters[t]; if(!players||!players.length) return;
  computeLayout(players,S.teamFormation[t]).forEach(({idx:i,x,y})=>{
    const p=players[i];
    const fx=p.cx!=null?p.cx:x, fy=p.cy!=null?p.cy:y;
    const c=placeCoord(t,fx,fy);
    field.appendChild(buildNode(t,i,c.x,c.y,interactive));
  });
}

function buildNode(t,i,x,y,interactive){
  const p=S.starters[t][i];
  const node=document.createElement('div');
  node.className='player-node'+(interactive?'':' static')+(interactive&&S.selPlayer===i?' sel':'');
  node.style.cssText=`left:${x}%;top:${y}%;`;

  let pc;
  if(p.img){
    pc=document.createElement('div'); pc.className='pc-shirt';
    const im=document.createElement('img'); im.src=p.img; im.crossOrigin='anonymous'; im.alt='';
    im.style.filter=kitFilter(t);   // recolour the shirt if this team's colour was changed
    im.onerror=()=>{ // fall back to a coloured circle if the jersey image fails
      const fb=document.createElement('div'); fb.className='pc'; fb.style.background=teamCol(t); fb.textContent=p.jersey;
      pc.replaceWith(fb);
    };
    pc.appendChild(im); // jersey image already shows the number — no overlay needed
  } else {
    pc=document.createElement('div'); pc.className='pc'; pc.style.background=teamCol(t); pc.textContent=p.jersey;
  }
  node.appendChild(pc);

  const b=buildBadges(p);
  if(b) node.appendChild(b);

  const lbl=document.createElement('div'); lbl.className='pn-label'; lbl.textContent=p.short||p.name; lbl.title=p.name;
  const role=document.createElement('div'); role.className='pn-role'; role.textContent=p.pos;
  node.appendChild(lbl); node.appendChild(role);

  if(interactive) attachDrag(node,t,i);
  return node;
}

function buildBadges(p){
  const items=[];
  if(p.goals>0) items.push('⚽'+(p.goals>1?p.goals:''));
  if(p.red>0) items.push('🟥'); else if(p.yellow>0) items.push('🟨');
  if(p.subbedIn) items.push('🔺'); else if(p.subbedOut) items.push('🔻');
  if(!items.length) return null;
  const wrap=document.createElement('div'); wrap.className='pn-badges';
  items.forEach(x=>{ const s=document.createElement('span'); s.textContent=x; wrap.appendChild(s); });
  return wrap;
}

// Drag to reposition; a click (no drag) selects the player for editing
function attachDrag(node,t,i){
  node.addEventListener('pointerdown',e=>{
    e.preventDefault();
    const rect=node.parentElement.getBoundingClientRect();
    const sx=e.clientX, sy=e.clientY; let moved=false, nx, ny;
    try{ node.setPointerCapture(e.pointerId);}catch(_){}
    node.classList.add('dragging');
    const move=ev=>{
      if(!moved && (Math.abs(ev.clientX-sx)>4||Math.abs(ev.clientY-sy)>4)) moved=true;
      if(!moved) return;
      nx=Math.max(4,Math.min(96,(ev.clientX-rect.left)/rect.width*100));
      ny=Math.max(5,Math.min(96,(ev.clientY-rect.top)/rect.height*100));
      node.style.left=nx+'%'; node.style.top=ny+'%';
    };
    const up=()=>{
      node.removeEventListener('pointermove',move);
      node.removeEventListener('pointerup',up);
      node.classList.remove('dragging');
      if(moved){ S.starters[t][i].cx=nx; S.starters[t][i].cy=ny; markDirty(t); }
      else selectPlayer(i);
    };
    node.addEventListener('pointermove',move);
    node.addEventListener('pointerup',up);
  });
}

function makePitchSVG(){
  const NS='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(NS,'svg');
  svg.setAttribute('viewBox','0 0 400 600');
  svg.setAttribute('preserveAspectRatio','none');
  svg.style.cssText='position:absolute;inset:0;width:100%;height:100%;';
  r(svg,0,0,400,600,'#276334');
  for(let i=0;i<8;i++) if(i%2===0) r(svg,0,i*75,400,75,'rgba(255,255,255,.03)');
  const lc='rgba(255,255,255,.55)', sw='1.5';
  const ln=(x1,y1,x2,y2)=>{const e=document.createElementNS(NS,'line');e.setAttribute('x1',x1);e.setAttribute('y1',y1);e.setAttribute('x2',x2);e.setAttribute('y2',y2);e.setAttribute('stroke',lc);e.setAttribute('stroke-width',sw);svg.appendChild(e);};
  const ci=(cx,cy,radius)=>{const e=document.createElementNS(NS,'circle');e.setAttribute('cx',cx);e.setAttribute('cy',cy);e.setAttribute('r',radius);e.setAttribute('fill','none');e.setAttribute('stroke',lc);e.setAttribute('stroke-width',sw);svg.appendChild(e);};
  const dot=(cx,cy)=>{const e=document.createElementNS(NS,'circle');e.setAttribute('cx',cx);e.setAttribute('cy',cy);e.setAttribute('r',3);e.setAttribute('fill',lc);svg.appendChild(e);};
  ln(20,20,380,20);ln(20,20,20,580);ln(380,20,380,580);ln(20,580,380,580);
  ln(20,300,380,300);
  ci(200,300,60);dot(200,300);
  ln(100,20,100,110);ln(300,20,300,110);ln(100,110,300,110);
  ln(148,20,148,52);ln(252,20,252,52);ln(148,52,252,52);dot(200,70);
  ln(100,490,100,580);ln(300,490,300,580);ln(100,490,300,490);
  ln(148,548,148,580);ln(252,548,252,580);ln(148,548,252,548);dot(200,530);
  r(svg,170,8,60,12,'rgba(255,255,255,.15)');
  r(svg,170,580,60,12,'rgba(255,255,255,.15)');
  return svg;
  function r(parent,x,y,w,h,fill){const e=document.createElementNS(NS,'rect');e.setAttribute('x',x);e.setAttribute('y',y);e.setAttribute('width',w);e.setAttribute('height',h);e.setAttribute('fill',fill);parent.appendChild(e);}
}

function renderBench(){
  const bl=document.getElementById('bench-list');
  const bench=S.bench[S.activeTeam]||[];
  if(!bench.length){ bl.innerHTML='<div style="color:#334155;font-size:0.8rem;padding:8px">No bench data</div>'; return; }
  bl.innerHTML=bench.map((p,i)=>`
    <div class="bench-player${S.selBench===i?' sel-bench':''}" onclick="selectBench(${i})">
      <div class="bp-jersey">${esc(p.jersey)}</div>
      <div><div class="bp-name">${esc(p.short||p.name)}</div><div class="bp-pos">${esc(p.pos)}${p.subbedIn?' · on':''}</div></div>
    </div>`).join('');
}

// ── INTERACTIONS ──────────────────────────────────────────────────────────
function selectMatch(id){
  stopPolling();
  document.querySelectorAll('.match-card').forEach(c=>c.classList.remove('active'));
  document.getElementById('mc-'+id)?.classList.add('active');
  S.matchId=id; S.selPlayer=null; S.selBench=null; S.dirty=[false,false];
  S.teamColorOverride=[null,null];
  document.getElementById('edit-section').style.display='none';
  fetchLineup(id).then(startPolling);
}

function selectPlayer(i){
  if(S.bothView) return;
  if(S.selPlayer===i){ clearSel(); return; }
  S.selPlayer=i; S.selBench=null;
  const p=S.starters[S.activeTeam][i];
  document.getElementById('e-name').value=p.name;
  document.getElementById('e-num').value=p.jersey;
  document.getElementById('e-pos').value=p.pos||'CM';
  document.getElementById('edit-head').textContent='Edit: '+(p.short||p.name);
  renderPlayerStats(p);
  document.getElementById('edit-section').style.display='block';
  document.getElementById('btn-sub').style.display='none';
  render();
}

function renderPlayerStats(p){
  const ps=document.getElementById('player-stats');
  const order=[['G','Goals'],['A','Assists'],['SHOT','Shots'],['SOG','On target'],['FC','Fouls'],['FA','Fouled'],['OF','Offside'],['YC','Yellow'],['RC','Red'],['SHF','Shots faced'],['GA','Conceded'],['APP','Apps']];
  const rows=order.filter(([k])=>p.stats&&p.stats[k]!=null).map(([k,l])=>`<div><span>${l}</span><b>${esc(p.stats[k])}</b></div>`).join('');
  ps.innerHTML = rows ? `<div class="stat-grid">${rows}</div>` : '';
}

function selectBench(i){
  if(S.bothView) return;
  if(S.selBench===i){ S.selBench=null; renderBench(); document.getElementById('btn-sub').style.display='none'; return; }
  S.selBench=i;
  document.getElementById('btn-sub').style.display = S.selPlayer!==null?'block':'none';
  renderBench();
}

function applyEdits(){
  if(S.selPlayer===null) return;
  const p=S.starters[S.activeTeam][S.selPlayer];
  p.name=document.getElementById('e-name').value.trim()||p.name;
  p.short=shortName(p.name);
  p.jersey=document.getElementById('e-num').value||p.jersey;
  p.pos=document.getElementById('e-pos').value;
  p.rawPos=p.pos;
  markDirty(S.activeTeam);
  renderPitch();
}

function makeSubstitution(){
  if(S.selPlayer===null||S.selBench===null) return;
  const st=S.starters[S.activeTeam], bn=S.bench[S.activeTeam];
  const si=S.selPlayer, bi=S.selBench;
  bn[bi].subbedIn=true;
  const tmp=st[si]; tmp.subbedIn=false; tmp.cx=null; tmp.cy=null;
  bn[bi].cx=tmp.cx; bn[bi].cy=tmp.cy;          // incoming player takes the slot
  st[si]=bn[bi]; bn[bi]=tmp;
  S.selPlayer=null; S.selBench=null;
  document.getElementById('edit-section').style.display='none';
  markDirty(S.activeTeam);
  render();
}

function clearSel(){
  S.selPlayer=null; S.selBench=null;
  document.getElementById('player-stats').innerHTML='';
  document.getElementById('edit-section').style.display='none';
  render();
}

function resetLineup(){
  if(!S.orig[S.activeTeam]?.length) return;
  S.starters[S.activeTeam]=clone(S.orig[S.activeTeam]);
  S.bench[S.activeTeam]=(S.bench[S.activeTeam]||[]).map(p=>({...p,subbedIn:false,cx:null,cy:null}));
  S.dirty[S.activeTeam]=false;
  saveEdits();
  clearSel();
}

function toggleBoth(){
  S.bothView=!S.bothView;
  document.getElementById('both-toggle').classList.toggle('on',S.bothView);
  document.getElementById('tab-0').classList.toggle('dim',S.bothView);
  document.getElementById('tab-1').classList.toggle('dim',S.bothView);
  clearSel();
}

// ── EXPORT: TEXT ─────────────────────────────────────────────────────────────
function exportLineup(){
  const t=S.activeTeam, team=t===0?S.homeTeam:S.awayTeam;
  const st=S.starters[t], bn=S.bench[t];
  let txt=`Golazo · World Cup 2026 — ${team}\nFormation: ${S.teamFormation[t]}\n${'─'.repeat(35)}\nSTARTING XI\n`;
  st.forEach((p,i)=>txt+=`  ${i+1}. #${p.jersey} ${p.name} [${p.pos}]\n`);
  txt+=`\nBENCH\n`;
  bn.forEach((p,i)=>txt+=`  ${i+12}. #${p.jersey} ${p.name} [${p.pos}]\n`);
  const blob=new Blob([txt],{type:'text/plain'});
  const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(blob),download:`${team.replace(/\s/g,'-')}-lineup.txt`});
  a.click(); URL.revokeObjectURL(a.href);
}

// ── EXPORT: PNG (canvas, watermark baked in) ─────────────────────────────────
function loadImg(src){ return new Promise(res=>{ const im=new Image(); im.crossOrigin='anonymous'; im.onload=()=>res(im); im.onerror=()=>res(null); im.src=src; }); }
function roundRect(ctx,x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

async function exportPNG(){
  const W=760,H=1140,sx=W/400,sy=H/600;
  // ensure the broadcast font is ready so the shared image renders in it, not a fallback
  try{ await Promise.all([
    document.fonts.load("700 14px 'Barlow Semi Condensed'"),
    document.fonts.load("800 18px 'Barlow Semi Condensed'"),
  ]); }catch(e){}

  // Draw the pitch + players onto its own canvas (untouched coordinate math)
  const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  const ctx=cv.getContext('2d');
  drawPitchCanvas(ctx,W,H,sx,sy);

  const teams=S.bothView?[0,1]:[S.activeTeam];
  const srcs=new Set(); teams.forEach(t=>S.starters[t].forEach(p=>{ if(p.img) srcs.add(p.img); }));
  const pairs=await Promise.all([...srcs].map(s=>loadImg(s).then(im=>[s,im])));
  const imgs=Object.fromEntries(pairs);
  const logo=await loadImg(LOGO_SRC);

  if(logo){
    const w=W*0.85, h=w*(logo.height/logo.width);
    ctx.globalAlpha=0.5; ctx.drawImage(logo,(W-w)/2,(H-h)/2,w,h); ctx.globalAlpha=1;
  }

  for(const t of teams){
    const players=S.starters[t];
    computeLayout(players,S.teamFormation[t]).forEach(({idx:i,x,y})=>{
      const p=players[i];
      const fx=p.cx!=null?p.cx:x, fy=p.cy!=null?p.cy:y;
      const c=placeCoord(t,fx,fy);
      drawPlayerCanvas(ctx,W,H,t,p,c.x,c.y,imgs[p.img]);
    });
  }
  drawTitleCanvas(ctx,W);

  // In both-teams view, composite the pitch between two squad panels (Lineup/Subs/Manager)
  let out=cv;
  if(S.bothView){
    const PW=320, OW=PW*2+W, OH=H;
    out=document.createElement('canvas'); out.width=OW; out.height=OH;
    const o=out.getContext('2d');
    o.fillStyle='#0f172a'; o.fillRect(0,0,OW,OH);
    o.drawImage(cv,PW,0);
    drawPanelCanvas(o,0,PW,OH,0,false);        // home, left, left-aligned
    drawPanelCanvas(o,PW+W,PW,OH,1,true);      // away, right, right-aligned
  }

  out.toBlob(b=>{
    if(!b){ alert('Export failed (image security). Try again.'); return; }
    const team=S.bothView?'match':(S.activeTeam===0?S.homeTeam:S.awayTeam);
    const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(b),download:`${String(team).replace(/\s/g,'-')}-lineup.png`});
    a.click(); URL.revokeObjectURL(a.href);
  },'image/png');
}

// Draw one team's squad panel onto the export canvas, scaling line-height to fit the column
function drawPanelCanvas(ctx,x0,w,h,t,right){
  const col=teamCol(t), pad=20, headH=66;
  ctx.fillStyle=col; ctx.fillRect(x0,0,w,headH);
  ctx.fillStyle='#fff'; ctx.font="800 24px 'Barlow Semi Condensed', system-ui";
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText((t===0?S.homeTeam:S.awayTeam).toUpperCase(), x0+w/2, headH/2, w-pad*2);

  const lines=[{s:'LINEUP'}];
  (S.starters[t]||[]).forEach(p=>lines.push({n:p.jersey,name:p.short||p.name}));
  const bench=S.bench[t]||[];
  if(bench.length){ lines.push({s:'SUBSTITUTIONS'}); bench.forEach(p=>lines.push({n:p.jersey,name:p.short||p.name})); }

  const top=headH+16, avail=h-top-16;
  const lh=Math.max(20,Math.min(40,avail/lines.length));
  const fs=Math.max(12,Math.min(17,lh*0.6));
  const lx=x0+pad, rx=x0+w-pad, numW=28, edge=right?rx:lx, nameMax=w-pad*2-numW;
  let y=top+lh/2;
  ctx.textBaseline='middle';
  for(const L of lines){
    ctx.textAlign=right?'right':'left';
    if(L.s){
      ctx.fillStyle='#64748b'; ctx.font=`700 ${Math.round(fs*0.78)}px 'Barlow Semi Condensed', system-ui`;
      if('letterSpacing' in ctx) ctx.letterSpacing='1.2px';
      ctx.fillText(L.s,edge,y,w-pad*2);
      if('letterSpacing' in ctx) ctx.letterSpacing='0px';
    } else {
      ctx.fillStyle='#94a3b8'; ctx.font=`700 ${Math.round(fs*0.84)}px 'Barlow Semi Condensed', system-ui`;
      ctx.fillText(String(L.n),edge,y);
      ctx.fillStyle='#f1f5f9'; ctx.font=`600 ${fs}px 'Barlow Semi Condensed', system-ui`;
      ctx.fillText(L.name.toUpperCase(), right?rx-numW:lx+numW, y, nameMax);
    }
    y+=lh;
  }
}

function drawPitchCanvas(ctx,W,H,sx,sy){
  ctx.fillStyle='#276334'; ctx.fillRect(0,0,W,H);
  for(let i=0;i<8;i++) if(i%2===0){ ctx.fillStyle='rgba(255,255,255,.03)'; ctx.fillRect(0,i*75*sy,W,75*sy); }
  ctx.strokeStyle='rgba(255,255,255,.55)'; ctx.lineWidth=1.5; ctx.fillStyle='rgba(255,255,255,.55)';
  const ln=(x1,y1,x2,y2)=>{ctx.beginPath();ctx.moveTo(x1*sx,y1*sy);ctx.lineTo(x2*sx,y2*sy);ctx.stroke();};
  const dot=(x,y)=>{ctx.beginPath();ctx.arc(x*sx,y*sy,3*sx,0,7);ctx.fill();};
  ln(20,20,380,20);ln(20,20,20,580);ln(380,20,380,580);ln(20,580,380,580);
  ln(20,300,380,300);
  ctx.beginPath(); ctx.ellipse(200*sx,300*sy,60*sx,60*sy,0,0,7); ctx.stroke(); dot(200,300);
  ln(100,20,100,110);ln(300,20,300,110);ln(100,110,300,110);
  ln(148,20,148,52);ln(252,20,252,52);ln(148,52,252,52);dot(200,70);
  ln(100,490,100,580);ln(300,490,300,580);ln(100,490,300,490);
  ln(148,548,148,580);ln(252,548,252,580);ln(148,548,252,548);dot(200,530);
  ctx.fillStyle='rgba(255,255,255,.15)'; ctx.fillRect(170*sx,8*sy,60*sx,12*sy); ctx.fillRect(170*sx,580*sy,60*sx,12*sy);
}

function drawPlayerCanvas(ctx,W,H,t,p,xp,yp,img){
  const px=xp/100*W, py=yp/100*H, R=27;
  if(img){
    const f=kitFilter(t);
    if(f) ctx.filter=f;                                  // recolour shirt to match a changed team colour
    ctx.drawImage(img,px-R,py-R,R*2,R*2); // jersey image already shows the number
    if(f) ctx.filter='none';
  } else {
    ctx.beginPath(); ctx.arc(px,py,R*0.74,0,7); ctx.fillStyle=teamCol(t); ctx.fill();
    ctx.lineWidth=2; ctx.strokeStyle='rgba(255,255,255,.5)'; ctx.stroke();
    ctx.font='bold 15px system-ui'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillStyle='#fff'; ctx.fillText(p.jersey,px,py);
  }
  // name label — broadcast nameplate
  const name=(p.short||p.name||'').toUpperCase();
  ctx.font="700 15px 'Barlow Semi Condensed', system-ui"; ctx.textAlign='center';
  if('letterSpacing' in ctx) ctx.letterSpacing='0.6px';
  const tw=ctx.measureText(name).width, ly=py+R+12;
  ctx.fillStyle='rgba(7,12,24,.82)'; roundRect(ctx,px-tw/2-7,ly-10,tw+14,20,5); ctx.fill();
  ctx.fillStyle='#fff'; ctx.textBaseline='middle'; ctx.fillText(name,px,ly);
  if('letterSpacing' in ctx) ctx.letterSpacing='0px';
  // markers
  ctx.font='13px system-ui'; ctx.textAlign='left';
  let m=''; if(p.goals>0) m+='⚽'+(p.goals>1?p.goals:''); if(p.red>0) m+='🟥'; else if(p.yellow>0) m+='🟨';
  if(m){ ctx.fillText(m, px+R-6, py-R+4); }
}

function drawTitleCanvas(ctx,W){
  ctx.fillStyle='rgba(15,23,42,.9)'; ctx.fillRect(0,0,W,34);
  ctx.fillStyle='#7bd957'; ctx.fillRect(0,0,4,34); // accent edge
  ctx.fillStyle='#fff'; ctx.font="800 18px 'Barlow Semi Condensed', system-ui";
  ctx.textAlign='center'; ctx.textBaseline='middle';
  if('letterSpacing' in ctx) ctx.letterSpacing='0.5px';
  let txt;
  if(S.bothView){
    const sc=(S.score[0]!==''&&S.score[1]!=='')?`  ${S.score[0]}–${S.score[1]}  `:'  VS  ';
    txt=`${S.homeTeam}${sc}${S.awayTeam}`;
  } else {
    const t=S.activeTeam; txt=`${t===0?S.homeTeam:S.awayTeam}  ·  ${S.teamFormation[t]}`;
  }
  ctx.fillText(txt.toUpperCase(),W/2,17);
  if('letterSpacing' in ctx) ctx.letterSpacing='0px';
}

// ── MATCH LIST UI ─────────────────────────────────────────────────────────
function renderMatchList(events){
  const list=document.getElementById('match-list');
  if(!events.length){ list.innerHTML='<div class="empty-state"><div class="empty-sub" style="padding:16px">No matches found for today.</div><button class="btn-manual" onclick="loadManual()">✏️ Create lineup manually</button></div>'; return; }
  list.innerHTML=events.map(ev=>{
    const comp=ev.competitions?.[0]||{};
    const teams=comp.competitors||[];
    const home=teams.find(t=>t.homeAway==='home')||teams[0]||{};
    const away=teams.find(t=>t.homeAway==='away')||teams[1]||{};
    const state=ev.status?.type?.state||'pre';
    const hs=home.score, as=away.score;
    const score=(hs!=null&&as!=null&&hs!==''&&as!=='')?`<span class="mc-score">${esc(hs)}-${esc(as)}</span>`:'<span style="color:#475569">vs</span>';
    const cls=state==='in'?'mc-live':state==='post'?'mc-ft':'mc-pre';
    const txt=state==='in'?('● '+esc(ev.status?.type?.detail||'LIVE')):state==='post'?'FT':(ev.date?new Date(ev.date).toLocaleString('en-GB',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):'');
    const hl=logoOf(home), al=logoOf(away);
    const hn=home.team?.shortDisplayName||home.team?.abbreviation||'Home';
    const an=away.team?.shortDisplayName||away.team?.abbreviation||'Away';
    return `<div class="match-card${String(ev.id)===String(S.matchId)?' active':''}" id="mc-${esc(ev.id)}" onclick="selectMatch('${esc(ev.id)}')">
      <div class="mc-teams">${hl?`<img src="${esc(hl)}" alt="">`:''}<span>${esc(hn)}</span> ${score} <span>${esc(an)}</span>${al?`<img src="${esc(al)}" alt="">`:''}</div>
      <div class="mc-meta"><span class="${cls}">${txt}</span></div>
    </div>`;
  }).join('');
}

function showMatchError(msg){
  document.getElementById('match-list').innerHTML=`
    <div style="padding:14px;font-size:0.8rem;color:#f87171;">${esc(msg)}</div>
    <div style="padding:0 14px 14px"><button class="btn-manual" onclick="loadManual()">✏️ Create lineup manually</button></div>`;
}

// ── HELPERS ───────────────────────────────────────────────────────────────
function shortName(full){ if(!full) return ''; const p=full.trim().split(/\s+/); return p.length<=1?full:p[p.length-1]; }

function normPos(raw){
  const m={GK:'GK',G:'GK',CB:'CB',DC:'CB',CD:'CB',LB:'LB',DL:'LB',RB:'RB',DR:'RB',
    LWB:'LWB',RWB:'RWB',CDM:'CDM',DM:'CDM',DMC:'CDM',CM:'CM',MC:'CM',MF:'CM',M:'CM',
    CAM:'CAM',AM:'CAM',AMC:'CAM',LM:'LM',ML:'LM',RM:'RM',MR:'RM',
    LW:'LW',RW:'RW',CF:'CF',ST:'ST',FW:'ST',F:'ST',SS:'CF'};
  const a=(raw||'').toUpperCase().replace(/-[RLC]$/,'');   // strip side suffix for tidy code
  return m[a]||m[(raw||'').toUpperCase()]||raw||'MID';
}

// Vertical rank (0 GK → 5 forward) from any position code, ESPN or editor.
function posRank(raw){
  const a=(raw||'').toUpperCase().trim();
  if(a==='G'||a==='GK') return 0;
  if(a.includes('WB')) return 1.5;
  if(['F','CF','ST','SS','RW','LW','RF','LF','W','FW'].includes(a)||a.startsWith('CF')||a.startsWith('F-')||a.startsWith('ST')) return 5;
  if(a.startsWith('AM')||a==='CAM') return 4;
  if(a.startsWith('DM')||a==='CDM') return 2;
  if(['RB','LB','CB','D','DC','DR','DL'].includes(a)||a.startsWith('CD')||a.startsWith('D-')||a.startsWith('CB')) return 1;
  return 3;
}
// Horizontal lean: + right, − left, 0 central.
function posSide(raw){
  const a=(raw||'').toUpperCase().trim();
  if(['RB','RWB','RM','RW','RF'].includes(a)) return 2;
  if(['LB','LWB','LM','LW','LF'].includes(a)) return -2;
  if(a.endsWith('-R')) return 1;
  if(a.endsWith('-L')) return -1;
  return 0;
}

// Map the 11 starters onto the pitch using their real positions + formation.
function computeLayout(players, formationStr){
  const codeOf=p=>p.rawPos||p.pos||'';
  const ids=players.map((_,i)=>i);
  let gk=ids.find(i=>posRank(codeOf(players[i]))===0);
  if(gk===undefined) gk=ids.slice().sort((a,b)=>(players[a].formationPlace||0)-(players[b].formationPlace||0))[0];
  const out=[{idx:gk,x:50,y:90}];
  let rest=ids.filter(i=>i!==gk).sort((a,b)=>
    (posRank(codeOf(players[a]))-posRank(codeOf(players[b]))) ||
    ((players[a].formationPlace||0)-(players[b].formationPlace||0)));
  let parts=(formationStr||'').split('-').map(Number).filter(n=>n>0);
  if(parts.reduce((s,n)=>s+n,0)!==rest.length) parts=fallbackBands(rest.map(i=>posRank(codeOf(players[i]))));
  const rows=parts.length; let c=0;
  parts.forEach((cnt,b)=>{
    const y=rows===1?45:74-(74-14)*b/(rows-1);
    const band=rest.slice(c,c+cnt); c+=cnt;
    band.sort((a,bb)=>(posSide(codeOf(players[a]))-posSide(codeOf(players[bb])))||((players[a].formationPlace||0)-(players[bb].formationPlace||0)));
    band.forEach((pi,k)=>{ const x=cnt===1?50:16+(84-16)*k/(cnt-1); out.push({idx:pi,x,y}); });
  });
  return out;
}
function fallbackBands(ranks){
  const def=ranks.filter(r=>r<=1.5).length, mid=ranks.filter(r=>r>1.5&&r<5).length, fwd=ranks.filter(r=>r>=5).length;
  return [def,mid,fwd].filter(n=>n>0);
}
function ensureFormationOption(f){
  if(!f) return;
  const sel=document.getElementById('fmn-select');
  if(![...sel.options].some(o=>o.value===f)) sel.appendChild(Object.assign(document.createElement('option'),{value:f,textContent:f}));
}
function detectFormation(players){
  if(!players||players.length<11) return null;
  const rest=players.filter(p=>posRank(p.rawPos||p.pos)!==0).slice(0,10);
  const def=rest.filter(p=>posRank(p.rawPos||p.pos)<=1.5).length;
  const fwd=rest.filter(p=>posRank(p.rawPos||p.pos)>=5).length;
  return [def,10-def-fwd,fwd].filter(n=>n>0).join('-');
}

// ── EVENTS ────────────────────────────────────────────────────────────────
document.querySelectorAll('.team-tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    if(S.bothView) return;
    document.querySelectorAll('.team-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    S.activeTeam=parseInt(tab.dataset.team);
    S.selPlayer=null; S.selBench=null;
    document.getElementById('edit-section').style.display='none';
    S.formation=S.teamFormation[S.activeTeam]||S.formation;
    ensureFormationOption(S.formation);
    document.getElementById('fmn-select').value=S.formation;
    render();
  });
});

document.getElementById('fmn-select').addEventListener('change',e=>{
  S.formation=e.target.value;
  S.teamFormation[S.activeTeam]=e.target.value;
  S.starters[S.activeTeam]?.forEach(p=>{ p.cx=null; p.cy=null; });  // re-flow to the new shape
  markDirty(S.activeTeam);
  renderPitch();
});

fetchMatches();
